name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    name: Lint · typecheck · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version from packageManager field
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm --filter app lint
      - name: Unit tests (when present)
        run: pnpm -r --if-present test
      - name: RLS coverage gate
        run: node scripts/check-rls-coverage.mjs
      - name: Build
        run: pnpm build
        env:
          # public local-dev defaults — real values come from Vercel envs
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH

  rls-tests:
    name: RLS test suite (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local database
        run: supabase db start
      - name: Run pgTAP suite
        run: supabase test db
