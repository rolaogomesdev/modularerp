name: Deploy database (staging → prod)

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-db.yml"

concurrency:
  group: deploy-db
  cancel-in-progress: false

jobs:
  migrate-staging:
    name: Migrate staging
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Guard — secrets present
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN or SUPABASE_STAGING_DB_PASSWORD repo secret"
            exit 1
          fi
      - run: supabase link --project-ref bhmgdrdlwmixxwxacfwq
      - run: supabase db push

  migrate-prod:
    name: Migrate production
    needs: migrate-staging
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Guard — secrets present
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN or SUPABASE_PROD_DB_PASSWORD repo secret"
            exit 1
          fi
      - run: supabase link --project-ref upwdgbjpyenkylqbvfbj
      - run: supabase db push
